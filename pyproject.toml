[project]
name = "reflection-agent"
version = "0.1.0"
description = "LangGraph reflection agent"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "python-dotenv",
    "black",
    "isort",
    "langchain",
    "langchain-openai",
    "langgraph",
    "grandalf",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["main.py", "chains.py"]
