[project]
name = "langgaph-course"
version = "0.1.0"
description = "LangGraph ReAct agent with function calling"
requires-python = ">=3.10"
dependencies = [
    "langchain>=0.3.25",
    "langchain-openai>=0.3.18",
    "langchain-tavily>=0.2.0",
    "langgraph>=0.4.7",
    "python-dotenv>=1.1.0",
    "black>=25.1.0",
    "isort>=6.0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["main.py", "nodes.py", "react.py"]
